<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-labelledby="title desc">
  <title id="title">Radio icon</title>
  <desc id="desc">A stylized square icon representing a mobile radio front panel with dual VFO display, spectrum waterfall, left knobs, and large tuning dial.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#151a28"/>
      <stop offset="0.55" stop-color="#0a0d15"/>
      <stop offset="1" stop-color="#05070b"/>
    </linearGradient>
    <linearGradient id="body" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2a2e39"/>
      <stop offset="0.4" stop-color="#12151e"/>
      <stop offset="1" stop-color="#07090e"/>
    </linearGradient>
    <linearGradient id="screen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#121a2a"/>
      <stop offset="0.45" stop-color="#05070d"/>
      <stop offset="1" stop-color="#030408"/>
    </linearGradient>
    <linearGradient id="knob" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#555b66"/>
      <stop offset="0.28" stop-color="#151923"/>
      <stop offset="0.58" stop-color="#090b10"/>
      <stop offset="1" stop-color="#2b3039"/>
    </linearGradient>
    <radialGradient id="dialFace" cx="50%" cy="44%" r="56%">
      <stop offset="0" stop-color="#7d838d"/>
      <stop offset="0.22" stop-color="#414854"/>
      <stop offset="0.55" stop-color="#121722"/>
      <stop offset="1" stop-color="#05070b"/>
    </radialGradient>
    <linearGradient id="waterfall" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3727ff" stop-opacity="0.78"/>
      <stop offset="0.5" stop-color="#ce1dff" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#ff3d2e" stop-opacity="0.85"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-25%" width="140%" height="150%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000" flood-opacity="0.48"/>
    </filter>
    <filter id="glowBlue" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="screenClip">
      <rect x="292" y="324" width="445" height="322" rx="22"/>
    </clipPath>
  </defs>

  <!-- app/media artwork tile; keep full-bleed so OS thumbnail masks own the corners -->
  <rect x="0" y="0" width="1024" height="1024" fill="url(#bg)"/>
  <circle cx="170" cy="168" r="170" fill="#25385f" opacity="0.16"/>
  <circle cx="854" cy="850" r="210" fill="#1c3d6f" opacity="0.12"/>

  <!-- radio body -->
  <g filter="url(#shadow)">
    <path d="M124 288c0-51 41-92 92-92h592c51 0 92 41 92 92v405c0 51-41 92-92 92H216c-51 0-92-41-92-92V288z" fill="url(#body)"/>
    <path d="M137 294c0-43 35-78 78-78h594c43 0 78 35 78 78v397c0 43-35 78-78 78H215c-43 0-78-35-78-78V294z" fill="none" stroke="#3d4452" stroke-width="4" opacity="0.78"/>
    <path d="M169 230h686c14 0 25 11 25 25v35H144v-35c0-14 11-25 25-25z" fill="#181c25"/>
    <path d="M196 246h73M294 246h73M392 246h73M490 246h73M588 246h73M686 246h73M784 246h50" stroke="#414752" stroke-width="8" stroke-linecap="round" opacity="0.65"/>

    <!-- small front speakers / lower lip -->
    <path d="M260 785h504c-10 30-36 50-66 50H326c-30 0-56-20-66-50z" fill="#080a0e" opacity="0.9"/>
    <path d="M320 798h384" stroke="#222834" stroke-width="8" stroke-linecap="round" opacity="0.65"/>
  </g>

  <!-- left control column -->
  <g>
    <path d="M164 314c0-37 30-67 67-67h55v470h-55c-37 0-67-30-67-67V314z" fill="#0c0f16" stroke="#343946" stroke-width="4"/>
    <text x="203" y="302" font-family="Inter, Arial, sans-serif" font-size="27" font-weight="800" fill="#e7edf7" text-anchor="middle">SUB</text>
    <text x="203" y="328" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="800" fill="#e7edf7" text-anchor="middle">DIAL</text>
    <g transform="translate(222 385)">
      <circle r="58" fill="#05070b"/>
      <circle r="47" fill="url(#knob)" stroke="#6d7480" stroke-width="3"/>
      <path d="M0-42v84M-42 0h84M-29-29l58 58M29-29l-58 58" stroke="#c3c8d0" stroke-opacity="0.2" stroke-width="3"/>
      <circle r="13" fill="#0d111a" stroke="#555e6e" stroke-width="2"/>
    </g>
    <rect x="182" y="472" width="82" height="55" rx="15" fill="#131820" stroke="#38404d" stroke-width="3"/>
    <path d="M202 497a18 18 0 1 0 40 0" fill="none" stroke="#ff445a" stroke-width="5" stroke-linecap="round"/>
    <path d="M222 477v22" stroke="#ff445a" stroke-width="5" stroke-linecap="round"/>
    <text x="223" y="558" font-family="Inter, Arial, sans-serif" font-size="23" font-weight="800" fill="#e7edf7" text-anchor="middle">AF/RF</text>
    <text x="223" y="584" font-family="Inter, Arial, sans-serif" font-size="23" font-weight="800" fill="#e7edf7" text-anchor="middle">SQL</text>
    <g transform="translate(222 665)">
      <circle r="58" fill="#05070b"/>
      <circle r="47" fill="url(#knob)" stroke="#6d7480" stroke-width="3"/>
      <path d="M0-42v84M-42 0h84M-29-29l58 58M29-29l-58 58" stroke="#c3c8d0" stroke-opacity="0.2" stroke-width="3"/>
      <circle r="13" fill="#0d111a" stroke="#555e6e" stroke-width="2"/>
    </g>
    <circle cx="259" cy="453" r="8" fill="#30a8ff" filter="url(#glowBlue)"/>
  </g>

  <!-- central touch display -->
  <g>
    <rect x="282" y="313" width="465" height="344" rx="32" fill="#030408" stroke="#3e4653" stroke-width="8"/>
    <rect x="292" y="324" width="445" height="322" rx="22" fill="url(#screen)"/>
    <g clip-path="url(#screenClip)">
      <rect x="292" y="324" width="445" height="322" fill="#030409"/>

      <!-- VFO status tags -->
      <rect x="312" y="344" width="49" height="27" rx="5" fill="#284eff"/>
      <text x="337" y="365" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="800" fill="#ffffff" text-anchor="middle">SUB</text>
      <rect x="365" y="344" width="48" height="27" rx="5" fill="#2b66ff"/>
      <text x="389" y="365" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="800" fill="#ffffff" text-anchor="middle">VFO</text>
      <rect x="312" y="376" width="34" height="24" rx="5" fill="#0dbb42"/>
      <text x="329" y="394" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="900" fill="#ffffff" text-anchor="middle">RX</text>

      <rect x="559" y="344" width="44" height="27" rx="5" fill="#ffffff" fill-opacity="0.12" stroke="#d6d9df" stroke-opacity="0.32"/>
      <text x="581" y="365" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="800" fill="#f4f6fa" text-anchor="middle">FM</text>
      <rect x="615" y="344" width="54" height="27" rx="5" fill="#2858ff"/>
      <text x="642" y="365" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="800" fill="#ffffff" text-anchor="middle">MAIN</text>
      <rect x="672" y="344" width="48" height="27" rx="5" fill="#2b66ff"/>
      <text x="696" y="365" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="800" fill="#ffffff" text-anchor="middle">VFO</text>
      <rect x="627" y="376" width="47" height="24" rx="5" fill="#ff304a"/>
      <text x="650" y="394" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="900" fill="#ffffff" text-anchor="middle">TX</text>

      <!-- dual frequency readout -->
      <text x="315" y="452" font-family="Inter, Arial, sans-serif" font-size="45" font-weight="900" letter-spacing="-1.8" fill="#e9f0ff">432.500</text>
      <text x="572" y="452" font-family="Inter, Arial, sans-serif" font-size="47" font-weight="900" letter-spacing="-1.8" fill="#e9e9ff">14.195</text>
      <text x="502" y="385" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="800" fill="#ffffff" opacity="0.74" text-anchor="middle">D578</text>

      <!-- meters -->
      <path d="M315 494h170" stroke="#d9e1f3" stroke-width="3" opacity="0.75"/>
      <path d="M553 494h170" stroke="#d9e1f3" stroke-width="3" opacity="0.75"/>
      <path d="M318 494l15-27 17 27 16-40 17 40 18-22 16 22 17-34 18 34 16-21 14 21" fill="none" stroke="#8894a8" stroke-width="3" opacity="0.7"/>
      <path d="M557 494l16-20 16 20 18-40 17 40 16-26 18 26 18-34 16 34 16-20 16 20" fill="none" stroke="#8894a8" stroke-width="3" opacity="0.7"/>
      <path d="M370 497c20-33 51-51 94-55" stroke="#ff304a" stroke-width="4" stroke-linecap="round"/>
      <path d="M605 497c34-38 70-56 112-54" stroke="#ff304a" stroke-width="4" stroke-linecap="round"/>

      <!-- scope grid -->
      <rect x="312" y="514" width="408" height="92" fill="#060810" stroke="#4a5365" stroke-opacity="0.66" stroke-width="2"/>
      <path d="M312 544h408M312 574h408M353 514v92M394 514v92M435 514v92M476 514v92M517 514v92M558 514v92M599 514v92M640 514v92M681 514v92" stroke="#5c6680" stroke-opacity="0.34" stroke-width="2"/>
      <path d="M312 602 C335 590 353 571 371 580 C388 590 405 542 424 560 C445 579 458 520 478 552 C500 590 517 531 535 544 C554 558 570 506 590 530 C613 559 626 522 648 539 C673 559 686 576 720 518 L720 606 L312 606 Z" fill="url(#waterfall)" opacity="0.78"/>
      <path d="M312 602 C342 600 362 593 383 585 C407 575 421 584 442 560 C467 531 478 568 498 552 C525 529 540 556 560 539 C588 518 599 548 623 534 C656 515 684 542 720 518" fill="none" stroke="#ff4040" stroke-width="3" opacity="0.88"/>
      <path d="M516 505v100" stroke="#ff344f" stroke-width="4" opacity="0.92"/>
      <path d="M506 507h20l-10 15z" fill="#ff344f"/>

      <!-- bottom soft keys -->
      <g font-family="Inter, Arial, sans-serif" font-size="18" font-weight="900" text-anchor="middle">
        <rect x="292" y="609" width="445" height="37" fill="#131721"/>
        <text x="339" y="634" fill="#f4f6fa">CENTER</text>
        <text x="417" y="634" fill="#6272ff">3DSS</text>
        <text x="496" y="634" fill="#f4f6fa">MULTI</text>
        <text x="573" y="634" fill="#f4f6fa">SCOPE</text>
        <text x="650" y="634" fill="#f4f6fa">SPAN</text>
        <text x="714" y="634" fill="#f4f6fa">SPEED</text>
      </g>
    </g>
    <rect x="292" y="324" width="445" height="322" rx="22" fill="none" stroke="#748095" stroke-opacity="0.45" stroke-width="2"/>
    <path d="M309 334c9-7 22-10 42-10h341" stroke="#ffffff" stroke-width="5" opacity="0.12" stroke-linecap="round"/>
  </g>

  <!-- right controls / tuning dial -->
  <g>
    <path d="M747 306c0-31 25-56 56-56h56c20 0 37 16 37 37v414c0 20-17 37-37 37h-56c-31 0-56-25-56-56V306z" fill="#0b0e14" stroke="#343946" stroke-width="4"/>
    <rect x="768" y="315" width="78" height="63" rx="18" fill="#151922" stroke="#3b4351" stroke-width="3"/>
    <text x="807" y="354" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="900" fill="#e9edf5" text-anchor="middle">QMB</text>

    <rect x="767" y="613" width="82" height="52" rx="16" fill="#151922" stroke="#3b4351" stroke-width="3"/>
    <text x="808" y="647" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="900" fill="#e9edf5" text-anchor="middle">BACK</text>

    <g transform="translate(820 492)">
      <circle r="132" fill="#05070b"/>
      <path d="M-121-5a122 122 0 0 1 35-80" fill="none" stroke="#1aa7ff" stroke-width="14" stroke-linecap="round" filter="url(#glowBlue)"/>
      <path d="M102-67a122 122 0 0 1 10 116" fill="none" stroke="#1aa7ff" stroke-width="14" stroke-linecap="round" opacity="0.74" filter="url(#glowBlue)"/>
      <circle r="103" fill="url(#knob)" stroke="#515866" stroke-width="4"/>
      <circle r="74" fill="url(#dialFace)" stroke="#9aa2ad" stroke-opacity="0.4" stroke-width="3"/>
      <path d="M0-72v144M-72 0h144M-51-51l102 102M51-51L-51 51" stroke="#dce2ec" stroke-opacity="0.16" stroke-width="4"/>
      <circle r="18" fill="#05070b" stroke="#929aa6" stroke-opacity="0.5" stroke-width="3"/>
    </g>
    <text x="821" y="262" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="900" fill="#79ff80" text-anchor="middle">MAIN / SUB</text>
    <rect x="852" y="260" width="14" height="42" rx="7" fill="#30ff68" filter="url(#glowBlue)"/>
  </g>

  <!-- subtle front panel label -->
  <text x="516" y="262" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="900" fill="#f58d44" text-anchor="middle" letter-spacing="1.5">D578</text>
  <text x="516" y="292" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="800" fill="#f0c08f" text-anchor="middle" opacity="0.75">ALL MODE SDR TRANSCEIVER</text>
</svg>
